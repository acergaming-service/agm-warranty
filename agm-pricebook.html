<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGM 料號管理</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --surface: #181c27;
  --surface2: #1f2535;
  --border: #2a3148;
  --border2: #3a4560;
  --accent: #4f8ef7;
  --accent2: #22d3a0;
  --danger: #f75555;
  --warning: #f7b955;
  --text: #e8ecf4;
  --text2: #8892a8;
  --text3: #4a5568;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Noto Sans TC', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:14px; min-height:100vh; }

/* Header */
header {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 28px;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:50;
}
.hdr-logo {
  font-family:var(--mono);
  font-size:15px;
  font-weight:600;
  color:var(--accent);
  letter-spacing:.5px;
}
.hdr-logo span { color:var(--text2); font-weight:400; }
.hdr-actions { display:flex; gap:8px; align-items:center; }
.btn {
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:7px 16px;
  border-radius:6px;
  font-size:13px;
  font-weight:600;
  font-family:var(--sans);
  cursor:pointer;
  border:none;
  transition:all .15s;
  white-space:nowrap;
}
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#6aa0ff; }
.btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border2); }
.btn-ghost:hover { color:var(--text); border-color:var(--accent); }
.btn-success { background:var(--accent2); color:#0a1a14; }
.btn-success:hover { background:#3de8b8; }
.btn-danger { background:transparent; color:var(--danger); border:1px solid #f7555544; }
.btn-danger:hover { background:#f7555511; }
.btn-sm { padding:5px 12px; font-size:12px; }

/* Tabs */
.tabs {
  display:flex;
  padding:0 28px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  gap:0;
}
.tab {
  padding:14px 24px;
  font-size:14px;
  font-weight:600;
  color:var(--text2);
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .15s;
  display:flex;
  align-items:center;
  gap:8px;
  user-select:none;
}
.tab:hover { color:var(--text); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-badge {
  font-family:var(--mono);
  font-size:11px;
  font-weight:600;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:1px 7px;
  color:var(--text2);
}
.tab.active .tab-badge { background:var(--accent)22; border-color:var(--accent)44; color:var(--accent); }

/* Toolbar */
.toolbar {
  padding:12px 28px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}
.search-wrap {
  position:relative;
  flex:1;
  min-width:200px;
  max-width:320px;
}
.search-wrap svg {
  position:absolute;
  left:10px;
  top:50%;
  transform:translateY(-50%);
  color:var(--text3);
  pointer-events:none;
}
.search-input {
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:6px;
  color:var(--text);
  font-family:var(--sans);
  font-size:13px;
  padding:8px 12px 8px 34px;
  outline:none;
  transition:border-color .15s;
}
.search-input:focus { border-color:var(--accent); }
.search-input::placeholder { color:var(--text3); }
.count-tag {
  font-family:var(--mono);
  font-size:12px;
  color:var(--text2);
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:5px;
  padding:4px 10px;
}

/* CSV 上傳區 */
.upload-bar {
  padding:12px 28px;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.upload-label {
  font-size:12px;
  color:var(--text2);
  font-weight:600;
  letter-spacing:.5px;
  text-transform:uppercase;
}
.file-input-wrap {
  position:relative;
  display:inline-flex;
  align-items:center;
}
.file-input-wrap input[type=file] {
  position:absolute;
  inset:0;
  opacity:0;
  cursor:pointer;
  width:100%;
}
.file-chip {
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 14px;
  background:var(--surface);
  border:1px dashed var(--border2);
  border-radius:6px;
  font-size:12px;
  color:var(--text2);
  cursor:pointer;
  transition:all .15s;
}
.file-chip:hover { border-color:var(--accent); color:var(--accent); }
.file-chip.has-file { border-style:solid; border-color:var(--accent2); color:var(--accent2); }
.upload-hint { font-size:11px; color:var(--text3); }
.col-map {
  display:flex;
  gap:6px;
  align-items:center;
  flex-wrap:wrap;
}
.col-select {
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:5px;
  color:var(--text);
  font-family:var(--sans);
  font-size:12px;
  padding:4px 8px;
  outline:none;
}
.col-label { font-size:12px; color:var(--text2); }

/* Table */
.tbl-wrap {
  overflow-x:auto;
  padding:16px 28px 80px;
}
table {
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
thead tr {
  border-bottom:1px solid var(--border2);
}
th {
  padding:10px 12px;
  text-align:left;
  font-size:11px;
  font-weight:700;
  font-family:var(--mono);
  color:var(--text3);
  letter-spacing:.8px;
  text-transform:uppercase;
  white-space:nowrap;
}
tbody tr {
  border-bottom:1px solid var(--border);
  transition:background .1s;
}
tbody tr:hover { background:var(--surface2); }
tbody tr.new-row { background:#4f8ef708; }
tbody tr.editing { background:#4f8ef710; outline:1px solid var(--accent)33; }
td {
  padding:9px 12px;
  vertical-align:middle;
}
.td-mono {
  font-family:var(--mono);
  font-size:12px;
  color:var(--accent);
}
.td-pn {
  font-family:var(--mono);
  font-size:12px;
  color:var(--accent2);
}
.td-price {
  font-family:var(--mono);
  font-size:13px;
  font-weight:600;
  color:var(--text);
  text-align:right;
}
.td-actions { white-space:nowrap; text-align:right; }

/* Inline edit inputs */
.cell-input {
  background:var(--surface2);
  border:1px solid var(--accent);
  border-radius:4px;
  color:var(--text);
  font-family:var(--mono);
  font-size:12px;
  padding:4px 8px;
  width:100%;
  outline:none;
  min-width:80px;
}
.cell-input.wide { min-width:180px; font-family:var(--sans); font-size:13px; }
.cell-input.price { max-width:90px; text-align:right; }

/* Inline add row */
.add-row-trigger {
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  color:var(--text3);
  font-size:13px;
  cursor:pointer;
  border-top:1px dashed var(--border);
  transition:all .15s;
}
.add-row-trigger:hover { color:var(--accent); background:var(--surface2); }

/* Toast */
.toast {
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  z-index:400;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:10px 20px;
  font-size:13px;
  font-weight:500;
  display:none;
  white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.toast.show { display:block; }
.toast.ok { border-color:var(--accent2)66; color:var(--accent2); }
.toast.err { border-color:var(--danger)66; color:var(--danger); }

/* Loading */
.spin {
  display:inline-block;
  width:14px; height:14px;
  border:2px solid var(--border2);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:sp .7s linear infinite;
  vertical-align:middle;
}
@keyframes sp { to { transform:rotate(360deg); } }
.empty {
  text-align:center;
  padding:60px 20px;
  color:var(--text3);
  font-size:14px;
}
.empty-icon { font-size:36px; margin-bottom:12px; opacity:.4; }

/* Progress */
.prog-bar {
  height:3px;
  background:var(--border);
  border-radius:2px;
  overflow:hidden;
  display:none;
  width:200px;
}
.prog-fill {
  height:100%;
  background:var(--accent);
  border-radius:2px;
  transition:width .3s;
  width:0%;
}

@media(max-width:640px) {
  .tbl-wrap { padding:12px 12px 80px; }
  header, .tabs, .toolbar, .upload-bar { padding-left:16px; padding-right:16px; }
}
</style>
</head>
<body>

<header>
  <div class="hdr-logo">AGM <span>/ 料號管理</span></div>
  <div class="hdr-actions">
    <a href="agm-admin.html" class="btn btn-ghost">← 返回後台</a>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('ss',this)">
    🎧 SteelSeries <span class="tab-badge" id="ss-count">0</span>
  </div>
  <div class="tab" onclick="switchTab('rz',this)">
    🐍 Razer <span class="tab-badge" id="rz-count">0</span>
  </div>
</div>

<!-- SS 工具列 -->
<div class="upload-bar" id="ss-upload">
  <span class="upload-label">CSV 匯入</span>
  <div class="file-input-wrap">
    <div class="file-chip" id="ss-file-chip">📂 選擇 CSV 檔案</div>
    <input type="file" id="ss-csv-file" accept=".csv" onchange="onFileSelect('ss',this)">
  </div>
  <div class="col-map" id="ss-col-map" style="display:none;">
    <span class="col-label">SS PN 欄：</span>
    <select class="col-select" id="ss-col-sspn"></select>
    <span class="col-label">AGM PN：</span>
    <select class="col-select" id="ss-col-agmpn"></select>
    <span class="col-label">英文名：</span>
    <select class="col-select" id="ss-col-nameen"></select>
    <span class="col-label">中文名：</span>
    <select class="col-select" id="ss-col-nametw"></select>
    <span class="col-label">MSRP：</span>
    <select class="col-select" id="ss-col-msrp"></select>
    <button class="btn btn-success btn-sm" onclick="importCSV('ss')">✓ 確認匯入</button>
    <button class="btn btn-ghost btn-sm" onclick="cancelCSV('ss')">取消</button>
  </div>
  <div class="prog-bar" id="ss-prog"><div class="prog-fill" id="ss-prog-fill"></div></div>
  <span class="upload-hint">支援 UTF-8 / Big5 CSV，第一行為標題列</span>
</div>

<div class="upload-bar" id="rz-upload" style="display:none;">
  <span class="upload-label">CSV 匯入</span>
  <div class="file-input-wrap">
    <div class="file-chip" id="rz-file-chip">📂 選擇 CSV 檔案</div>
    <input type="file" id="rz-csv-file" accept=".csv" onchange="onFileSelect('rz',this)">
  </div>
  <div class="col-map" id="rz-col-map" style="display:none;">
    <span class="col-label">AGBS PN 欄：</span>
    <select class="col-select" id="rz-col-agbspn"></select>
    <span class="col-label">Razer 型號：</span>
    <select class="col-select" id="rz-col-model"></select>
    <span class="col-label">品名：</span>
    <select class="col-select" id="rz-col-name"></select>
    <span class="col-label">系列：</span>
    <select class="col-select" id="rz-col-series"></select>
    <span class="col-label">SRP：</span>
    <select class="col-select" id="rz-col-srp"></select>
    <button class="btn btn-success btn-sm" onclick="importCSV('rz')">✓ 確認匯入</button>
    <button class="btn btn-ghost btn-sm" onclick="cancelCSV('rz')">取消</button>
  </div>
  <div class="prog-bar" id="rz-prog"><div class="prog-fill" id="rz-prog-fill"></div></div>
  <span class="upload-hint">支援 UTF-8 / Big5 CSV，AGBS PN 格式：ZL.A00TZ.XXX</span>
</div>

<!-- 搜尋列 -->
<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" type="text" id="searchInput" placeholder="搜尋料號、品名..." oninput="renderTable()">
  </div>
  <button class="btn btn-primary btn-sm" onclick="addRow()">＋ 新增一筆</button>
  <span class="count-tag" id="countTag">0 筆</span>
</div>

<!-- SS 表格 -->
<div class="tbl-wrap" id="ss-panel">
  <table>
    <thead>
      <tr>
        <th>SS PN</th>
        <th>AGM PN</th>
        <th>英文名稱</th>
        <th>中文名稱</th>
        <th style="text-align:right;">MSRP</th>
        <th style="text-align:right;"></th>
      </tr>
    </thead>
    <tbody id="ss-tbody"></tbody>
  </table>
</div>

<!-- RZ 表格 -->
<div class="tbl-wrap" id="rz-panel" style="display:none;">
  <table>
    <thead>
      <tr>
        <th>AGBS PN</th>
        <th>Razer 型號</th>
        <th>品名</th>
        <th>系列</th>
        <th style="text-align:right;">SRP</th>
        <th style="text-align:right;"></th>
      </tr>
    </thead>
    <tbody id="rz-tbody"></tbody>
  </table>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, doc, getDocs,
  writeBatch, deleteDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyAtyrpyLSrUHhrDdnqwdJjpzmZGK9vbzUQ",
  authDomain:        "agm-warranty.firebaseapp.com",
  projectId:         "agm-warranty",
  storageBucket:     "agm-warranty.firebasestorage.app",
  messagingSenderId: "130595956759",
  appId:             "1:130595956759:web:a8eebcbdd4f4c975729452"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── 狀態 ────────────────────────────────────────────────────
let currentTab = 'ss';
let ssData = []; // { id, ssPn, agmPn, nameEN, nameTW, msrp }
let rzData = []; // { id, agbsPn, razerModel, name, series, msrp }
let csvHeaders = [];
let csvRows    = [];

// ── 載入資料 ─────────────────────────────────────────────────
async function loadAll() {
  const snap = await getDocs(collection(db, 'pricebook'));
  ssData = []; rzData = [];
  snap.forEach(d => {
    const item = { id: d.id, ...d.data() };
    if (item.brand === 'SteelSeries') ssData.push(item);
    else if (item.brand === 'Razer')  rzData.push(item);
  });
  ssData.sort((a,b) => (a.ssPn||'').localeCompare(b.ssPn||''));
  rzData.sort((a,b) => (a.agbsPn||'').localeCompare(b.agbsPn||''));
  document.getElementById('ss-count').textContent = ssData.length;
  document.getElementById('rz-count').textContent = rzData.length;
  renderTable();
}

// ── 切換分頁 ─────────────────────────────────────────────────
window.switchTab = (tab, el) => {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('ss-panel').style.display  = tab==='ss' ? '' : 'none';
  document.getElementById('rz-panel').style.display  = tab==='rz' ? '' : 'none';
  document.getElementById('ss-upload').style.display = tab==='ss' ? '' : 'none';
  document.getElementById('rz-upload').style.display = tab==='rz' ? '' : 'none';
  document.getElementById('searchInput').value = '';
  renderTable();
};

// ── 渲染表格 ─────────────────────────────────────────────────
function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  if (currentTab === 'ss') {
    const list = ssData.filter(r => !q || [r.ssPn,r.agmPn,r.nameEN,r.nameTW].join(' ').toLowerCase().includes(q));
    document.getElementById('countTag').textContent = list.length + ' 筆';
    document.getElementById('ss-tbody').innerHTML = list.length
      ? list.map(r => ssRow(r)).join('') + addRowTrigger()
      : `<tr><td colspan="6" class="empty"><div class="empty-icon">📋</div>尚無資料，請新增或上傳 CSV</td></tr>`;
  } else {
    const list = rzData.filter(r => !q || [r.agbsPn,r.razerModel,r.name,r.series].join(' ').toLowerCase().includes(q));
    document.getElementById('countTag').textContent = list.length + ' 筆';
    document.getElementById('rz-tbody').innerHTML = list.length
      ? list.map(r => rzRow(r)).join('') + addRowTrigger()
      : `<tr><td colspan="6" class="empty"><div class="empty-icon">📋</div>尚無資料，請新增或上傳 CSV</td></tr>`;
  }
}

const fmt = n => n ? Number(n).toLocaleString() : '—';

function ssRow(r) {
  return `<tr id="row-${r.id}">
    <td class="td-mono">${esc(r.ssPn||'')}</td>
    <td class="td-pn">${esc(r.agmPn||'')}</td>
    <td>${esc(r.nameEN||'')}</td>
    <td>${esc(r.nameTW||'')}</td>
    <td class="td-price">$${fmt(r.msrp)}</td>
    <td class="td-actions">
      <button class="btn btn-ghost btn-sm" onclick="editRow('${r.id}','ss')">編輯</button>
      <button class="btn btn-danger btn-sm" onclick="deleteRow('${r.id}','ss')">刪除</button>
    </td>
  </tr>`;
}
function rzRow(r) {
  return `<tr id="row-${r.id}">
    <td class="td-pn">${esc(r.agbsPn||'')}</td>
    <td class="td-mono">${esc(r.razerModel||'')}</td>
    <td>${esc(r.name||'')}</td>
    <td style="color:var(--text2)">${esc(r.series||'')}</td>
    <td class="td-price">$${fmt(r.msrp)}</td>
    <td class="td-actions">
      <button class="btn btn-ghost btn-sm" onclick="editRow('${r.id}','rz')">編輯</button>
      <button class="btn btn-danger btn-sm" onclick="deleteRow('${r.id}','rz')">刪除</button>
    </td>
  </tr>`;
}
function addRowTrigger() {
  return `<tr><td colspan="6"><div class="add-row-trigger" onclick="addRow()">＋ 新增一筆</div></td></tr>`;
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── 新增一筆（inline）───────────────────────────────────────
window.addRow = () => {
  const tbody = document.getElementById(currentTab + '-tbody');
  const id = '_new_' + Date.now();
  const tr = document.createElement('tr');
  tr.id = 'row-' + id;
  tr.className = 'new-row';
  if (currentTab === 'ss') {
    tr.innerHTML = `
      <td><input class="cell-input" id="ni-sspn" placeholder="61527"></td>
      <td><input class="cell-input" id="ni-agmpn" placeholder="ZL.A00TZ.0W6"></td>
      <td><input class="cell-input wide" id="ni-nameen" placeholder="Arctis Nova Pro"></td>
      <td><input class="cell-input wide" id="ni-nametw" placeholder="賽睿 Arctis Nova Pro 有線耳機"></td>
      <td><input class="cell-input price" id="ni-msrp" placeholder="8990" type="number"></td>
      <td class="td-actions">
        <button class="btn btn-success btn-sm" onclick="saveNew('ss')">儲存</button>
        <button class="btn btn-ghost btn-sm" onclick="cancelNew()">取消</button>
      </td>`;
  } else {
    tr.innerHTML = `
      <td><input class="cell-input" id="ni-agbspn" placeholder="ZL.A00TZ.103"></td>
      <td><input class="cell-input" id="ni-model" placeholder="RZ04-03240900-R3M1"></td>
      <td><input class="cell-input wide" id="ni-name" placeholder="Razer BlackShark V2 X"></td>
      <td><input class="cell-input" id="ni-series" placeholder="電競頭戴式耳機"></td>
      <td><input class="cell-input price" id="ni-msrp" placeholder="1690" type="number"></td>
      <td class="td-actions">
        <button class="btn btn-success btn-sm" onclick="saveNew('rz')">儲存</button>
        <button class="btn btn-ghost btn-sm" onclick="cancelNew()">取消</button>
      </td>`;
  }
  tbody.insertBefore(tr, tbody.firstChild);
  tr.querySelector('input').focus();
};

window.cancelNew = () => {
  const r = document.querySelector('.new-row');
  if (r) r.remove();
};

window.saveNew = async (tab) => {
  const msrp = parseInt(document.getElementById('ni-msrp')?.value) || 0;
  let docId, data;
  if (tab === 'ss') {
    const ssPn  = document.getElementById('ni-sspn').value.trim();
    const agmPn = document.getElementById('ni-agmpn').value.trim();
    if (!ssPn) { toast('請填寫 SS PN', 'err'); return; }
    const key = /^\d+/.test(ssPn) ? ssPn.substring(0,5) : ssPn;
    docId = 'SS_' + key;
    data = { ssPn, agmPn, nameEN: document.getElementById('ni-nameen').value.trim(), nameTW: document.getElementById('ni-nametw').value.trim(), msrp, brand:'SteelSeries', updatedAt: new Date().toISOString() };
  } else {
    const agbsPn = document.getElementById('ni-agbspn').value.trim();
    if (!agbsPn) { toast('請填寫 AGBS PN', 'err'); return; }
    docId = 'RZ_' + agbsPn;
    data = { agbsPn, razerModel: document.getElementById('ni-model').value.trim(), name: document.getElementById('ni-name').value.trim(), series: document.getElementById('ni-series').value.trim(), msrp, brand:'Razer', updatedAt: new Date().toISOString() };
  }
  try {
    await setDoc(doc(db, 'pricebook', docId), data);
    toast('✓ 已新增', 'ok');
    await loadAll();
  } catch(e) { toast('儲存失敗', 'err'); }
};

// ── 編輯一筆（inline）───────────────────────────────────────
window.editRow = (id, tab) => {
  const item = tab === 'ss' ? ssData.find(r=>r.id===id) : rzData.find(r=>r.id===id);
  if (!item) return;
  const tr = document.getElementById('row-' + id);
  tr.className = 'editing';
  if (tab === 'ss') {
    tr.innerHTML = `
      <td><input class="cell-input" id="ei-sspn" value="${esc(item.ssPn||'')}"></td>
      <td><input class="cell-input" id="ei-agmpn" value="${esc(item.agmPn||'')}"></td>
      <td><input class="cell-input wide" id="ei-nameen" value="${esc(item.nameEN||'')}"></td>
      <td><input class="cell-input wide" id="ei-nametw" value="${esc(item.nameTW||'')}"></td>
      <td><input class="cell-input price" id="ei-msrp" value="${item.msrp||0}" type="number"></td>
      <td class="td-actions">
        <button class="btn btn-success btn-sm" onclick="saveEdit('${id}','ss')">儲存</button>
        <button class="btn btn-ghost btn-sm" onclick="renderTable()">取消</button>
      </td>`;
  } else {
    tr.innerHTML = `
      <td><input class="cell-input" id="ei-agbspn" value="${esc(item.agbsPn||'')}"></td>
      <td><input class="cell-input" id="ei-model" value="${esc(item.razerModel||'')}"></td>
      <td><input class="cell-input wide" id="ei-name" value="${esc(item.name||'')}"></td>
      <td><input class="cell-input" id="ei-series" value="${esc(item.series||'')}"></td>
      <td><input class="cell-input price" id="ei-msrp" value="${item.msrp||0}" type="number"></td>
      <td class="td-actions">
        <button class="btn btn-success btn-sm" onclick="saveEdit('${id}','rz')">儲存</button>
        <button class="btn btn-ghost btn-sm" onclick="renderTable()">取消</button>
      </td>`;
  }
  tr.querySelector('input').focus();
};

window.saveEdit = async (id, tab) => {
  const msrp = parseInt(document.getElementById('ei-msrp')?.value) || 0;
  let data;
  if (tab === 'ss') {
    data = { ssPn: document.getElementById('ei-sspn').value.trim(), agmPn: document.getElementById('ei-agmpn').value.trim(), nameEN: document.getElementById('ei-nameen').value.trim(), nameTW: document.getElementById('ei-nametw').value.trim(), msrp, brand:'SteelSeries', updatedAt: new Date().toISOString() };
  } else {
    data = { agbsPn: document.getElementById('ei-agbspn').value.trim(), razerModel: document.getElementById('ei-model').value.trim(), name: document.getElementById('ei-name').value.trim(), series: document.getElementById('ei-series').value.trim(), msrp, brand:'Razer', updatedAt: new Date().toISOString() };
  }
  try {
    await setDoc(doc(db, 'pricebook', id), data);
    toast('✓ 已更新', 'ok');
    await loadAll();
  } catch(e) { toast('儲存失敗', 'err'); }
};

// ── 刪除 ─────────────────────────────────────────────────────
window.deleteRow = async (id, tab) => {
  const item = tab === 'ss' ? ssData.find(r=>r.id===id) : rzData.find(r=>r.id===id);
  const label = tab === 'ss' ? (item?.ssPn||id) : (item?.agbsPn||id);
  if (!confirm(`確定刪除「${label}」？`)) return;
  try {
    await deleteDoc(doc(db, 'pricebook', id));
    toast('✓ 已刪除', 'ok');
    await loadAll();
  } catch(e) { toast('刪除失敗', 'err'); }
};

// ── CSV 解析（UTF-8 / Big5 自動偵測）───────────────────────
window.onFileSelect = (tab, input) => {
  const file = input.files[0]; if (!file) return;
  const chip = document.getElementById(tab + '-file-chip');
  chip.textContent = '📄 ' + file.name;
  chip.classList.add('has-file');

  const reader = new FileReader();
  reader.onload = e => {
    let text = e.target.result;
    // 嘗試偵測 Big5
    if (text.includes('ï¿½') || /\ufffd/.test(text)) {
      const rb = new FileReader();
      rb.onload = e2 => {
        const dec = new TextDecoder('big5');
        text = dec.decode(e2.target.result);
        parseAndShow(tab, text);
      };
      rb.readAsArrayBuffer(file);
    } else {
      parseAndShow(tab, text);
    }
  };
  reader.readAsText(file, 'utf-8');
};

function parseAndShow(tab, text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) { toast('CSV 格式有誤', 'err'); return; }

  // 解析 header
  csvHeaders = parseCSVLine(lines[0]);
  csvRows    = lines.slice(1).map(l => parseCSVLine(l)).filter(r => r.some(c => c.trim()));

  // 建立欄位下拉
  const opts = csvHeaders.map((h,i) => `<option value="${i}">${h || '欄 '+i}</option>`).join('');
  const noOpt = `<option value="-1">— 略過 —</option>`;

  if (tab === 'ss') {
    ['ss-col-sspn','ss-col-agmpn','ss-col-nameen','ss-col-nametw','ss-col-msrp'].forEach((id,i) => {
      document.getElementById(id).innerHTML = noOpt + opts;
      // 預設猜欄位
      const guesses = [/ss.*pn|ss.*no|ss.*product/i, /agm.*pn|agm.*no/i, /desc.*en|english|nameEN/i, /desc.*tw|中文|nameTW/i, /msrp|price|srp|價格/i];
      const match = csvHeaders.findIndex(h => guesses[i] && guesses[i].test(h));
      document.getElementById(id).value = match >= 0 ? match : i < csvHeaders.length ? i : -1;
    });
    document.getElementById('ss-col-map').style.display = 'flex';
  } else {
    ['rz-col-agbspn','rz-col-model','rz-col-name','rz-col-series','rz-col-srp'].forEach((id,i) => {
      document.getElementById(id).innerHTML = noOpt + opts;
      const guesses = [/agbs.*pn|agbs/i, /razer.*model|razer.*no|型號/i, /品名|name|desc/i, /系列|series/i, /srp|msrp|price|價格/i];
      const match = csvHeaders.findIndex(h => guesses[i] && guesses[i].test(h));
      document.getElementById(id).value = match >= 0 ? match : i < csvHeaders.length ? i : -1;
    });
    document.getElementById('rz-col-map').style.display = 'flex';
  }
}

function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  result.push(cur.trim());
  return result;
}

function cleanNum(v) {
  const s = String(v||'').replace(/[\$,\s]/g,'');
  const n = parseFloat(s);
  return isNaN(n) ? 0 : Math.round(n);
}

window.cancelCSV = (tab) => {
  document.getElementById(tab + '-col-map').style.display = 'none';
  document.getElementById(tab + '-file-chip').textContent = '📂 選擇 CSV 檔案';
  document.getElementById(tab + '-file-chip').classList.remove('has-file');
  document.getElementById(tab + '-csv-file').value = '';
  csvHeaders = []; csvRows = [];
};

// ── 執行匯入 ─────────────────────────────────────────────────
window.importCSV = async (tab) => {
  const getCol = id => parseInt(document.getElementById(id).value);
  const items = {};

  if (tab === 'ss') {
    const ci = { ssPn: getCol('ss-col-sspn'), agmPn: getCol('ss-col-agmpn'), nameEN: getCol('ss-col-nameen'), nameTW: getCol('ss-col-nametw'), msrp: getCol('ss-col-msrp') };
    csvRows.forEach(row => {
      const ssPn = ci.ssPn >= 0 ? row[ci.ssPn]?.trim() : '';
      if (!ssPn) return;
      const key = /^\d+/.test(ssPn) ? 'SS_' + ssPn.substring(0,5) : 'SS_' + ssPn;
      items[key] = {
        ssPn,
        agmPn:   ci.agmPn  >= 0 ? row[ci.agmPn]?.trim()  || '' : '',
        nameEN:  ci.nameEN >= 0 ? row[ci.nameEN]?.trim()  || '' : '',
        nameTW:  ci.nameTW >= 0 ? row[ci.nameTW]?.trim()  || '' : '',
        msrp:    ci.msrp   >= 0 ? cleanNum(row[ci.msrp])        : 0,
        brand:   'SteelSeries',
        updatedAt: new Date().toISOString()
      };
    });
  } else {
    const ci = { agbsPn: getCol('rz-col-agbspn'), model: getCol('rz-col-model'), name: getCol('rz-col-name'), series: getCol('rz-col-series'), srp: getCol('rz-col-srp') };
    csvRows.forEach(row => {
      const agbsPn = ci.agbsPn >= 0 ? row[ci.agbsPn]?.trim() : '';
      if (!agbsPn || !agbsPn.startsWith('ZL.')) return;
      items['RZ_' + agbsPn] = {
        agbsPn,
        razerModel: ci.model  >= 0 ? row[ci.model]?.trim()  || '' : '',
        name:       ci.name   >= 0 ? row[ci.name]?.trim()   || '' : '',
        series:     ci.series >= 0 ? row[ci.series]?.trim() || '' : '',
        msrp:       ci.srp    >= 0 ? cleanNum(row[ci.srp])        : 0,
        brand:      'Razer',
        updatedAt:  new Date().toISOString()
      };
    });
  }

  const keys = Object.keys(items);
  if (!keys.length) { toast('沒有有效資料可匯入', 'err'); return; }

  const progBar  = document.getElementById(tab + '-prog');
  const progFill = document.getElementById(tab + '-prog-fill');
  progBar.style.display = 'block'; progFill.style.width = '0%';

  const BATCH = 400;
  let done = 0;
  for (let i = 0; i < keys.length; i += BATCH) {
    const batch = writeBatch(db);
    keys.slice(i, i + BATCH).forEach(k => {
      batch.set(doc(db, 'pricebook', k), items[k]);
    });
    await batch.commit();
    done += Math.min(BATCH, keys.length - i);
    progFill.style.width = Math.round(done / keys.length * 100) + '%';
  }

  progBar.style.display = 'none';
  toast(`✓ 匯入完成，共 ${keys.length} 筆`, 'ok');
  cancelCSV(tab);
  await loadAll();
};

// ── Toast ─────────────────────────────────────────────────────
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  setTimeout(() => el.classList.remove('show'), 3000);
}
window.toast = toast;

// 初始載入
loadAll();
</script>
